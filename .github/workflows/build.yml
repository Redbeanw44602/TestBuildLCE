name: Build

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Run
        run: |
          git clone https://github.com/smartcmd/MinecraftConsoles.git
          cd MinecraftConsoles
          git checkout d26f70a0cb33b7410ae959a3597b53b5d3e5090f
          msbuild MinecraftConsoles.sln /p:Configuration=Debug /p:Platform=Windows64 /m

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: client
          path: |
            MinecraftConsoles/x64/Debug

